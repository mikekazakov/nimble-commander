server.document-root = "/var/www"
server.port          = 80
server.username      = "lighttpd"
server.groupname     = "lighttpd"

server.modules = (
    "mod_auth",
    "mod_authn_file",
    "mod_webdav",
)

auth.backend = "htpasswd"
auth.backend.htpasswd.userfile = "/etc/lighttpd/.htpasswd"

webdav.activate    = "enable"
webdav.is-readonly = "disable"

$HTTP["url"] =~ "^/webdav($|/)" {
    auth.require = ("" => (
        "method"  => "basic",
        "realm"   => "webdav",
        "require" => "valid-user",
    ))
}
